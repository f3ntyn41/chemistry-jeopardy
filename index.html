<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Jeopardy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0a1f6e;
    --blue-mid: #122494;
    --blue-light: #1a34c8;
    --gold: #f5c518;
    --gold-dark: #c9a010;
    --white: #f0ecd8;
    --cyan: #00d4ff;
    --cell-bg: #0d2a9e;
    --cell-hover: #1840d0;
    --used: #06103d;
    --used-text: #2a3a7a;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #atom-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  body {
    background: #06103d;
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    color: var(--white);
    position: relative;
  }

  header, #scoreboard, #board-wrap, #footer, footer {
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    color: var(--gold);
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(245,197,24,0.4), 3px 3px 0 #7a5c00;
    line-height: 1;
  }

  header p {
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Scoreboard */
  #scoreboard {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .team-score {
    background: var(--blue-mid);
    border: 2px solid var(--gold);
    border-radius: 8px;
    padding: 8px 20px;
    text-align: center;
    min-width: 130px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }

  .team-score:hover { background: var(--blue-light); }

  .team-score .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--cyan);
  }

  .team-score .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    line-height: 1.1;
  }

  .team-score .score-val.negative { color: #ff6b6b; }

  /* Board */
  #board-wrap {
    width: 100%;
    max-width: 1400px;
    overflow-x: auto;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    min-width: 700px;
  }

  .cat-header {
    background: var(--blue-mid);
    border: 2px solid var(--gold-dark);
    border-radius: 6px;
    padding: 10px 6px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.85rem, 1.4vw, 1.15rem);
    letter-spacing: 2px;
    color: var(--white);
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    line-height: 1.2;
  }

  .cell {
    background: var(--cell-bg);
    border: 2px solid #1e3fb5;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 4px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    aspect-ratio: 1.4 / 1;
    box-shadow: var(--shadow);
  }

  .cell:hover:not(.used) {
    background: var(--cell-hover);
    transform: scale(1.04);
    box-shadow: 0 6px 28px rgba(0,212,255,0.25);
    border-color: var(--cyan);
  }

  .cell.used {
    background: var(--used);
    border-color: #1a2560;
    cursor: default;
  }

  .cell .dollar {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1rem, 2.2vw, 1.8rem);
    color: var(--gold);
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .cell.used .dollar { color: var(--used-text); }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2,8,40,0.88);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #modal-overlay.active { display: flex; }

  #modal {
    background: var(--blue-mid);
    border: 3px solid var(--gold);
    border-radius: 16px;
    max-width: 680px;
    width: 100%;
    padding: 36px 40px;
    box-shadow: 0 0 60px rgba(245,197,24,0.2), var(--shadow);
    position: relative;
    animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  #modal .modal-category {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 4px;
    color: var(--cyan);
    margin-bottom: 6px;
  }

  #modal .modal-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--gold);
    margin-bottom: 20px;
    line-height: 1;
  }

  #modal .modal-question {
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 600;
    line-height: 1.5;
    color: var(--white);
    margin-bottom: 28px;
    min-height: 60px;
  }

  #modal .modal-answer {
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 1.15rem;
    color: var(--cyan);
    margin-bottom: 24px;
    display: none;
  }

  #modal .modal-answer.visible { display: block; }

  .modal-btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    padding: 10px 22px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, filter 0.1s;
  }
  .btn:hover { transform: scale(1.04); filter: brightness(1.1); }
  .btn:active { transform: scale(0.97); }

  .btn-gold    { background: var(--gold); color: #1a1000; }
  .btn-green   { background: #27ae60; color: #fff; }
  .btn-red     { background: #c0392b; color: #fff; }
  .btn-gray    { background: #2a3a7a; color: var(--white); }

  /* Score team selector in modal */
  #score-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .score-team-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 5px;
    border: 2px solid transparent;
    cursor: pointer;
    background: #1a2a80;
    color: var(--white);
    transition: all 0.15s;
  }
  .score-team-btn.selected { border-color: var(--gold); background: var(--blue-light); color: var(--gold); }

  #modal-close {
    position: absolute;
    top: 14px; right: 18px;
    background: none;
    border: none;
    color: #5a6fa0;
    font-size: 1.6rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.15s;
  }
  #modal-close:hover { color: var(--gold); }

  /* Name edit */
  .team-score input.name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--gold);
    color: var(--cyan);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    width: 100%;
    text-align: center;
    outline: none;
  }

  footer {
    margin-top: 20px;
    font-size: 0.8rem;
    color: #3a4e8a;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<canvas id="atom-bg"></canvas>

<header>
  <h1>⚗️ Chemistry Jeopardy</h1>
  <p>The Periodic Game of Knowledge</p>
</header>

<div id="scoreboard"></div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div class="modal-category" id="m-cat"></div>
    <div class="modal-value" id="m-val"></div>
    <div class="modal-question" id="m-q"></div>
    <div class="modal-answer" id="m-a"></div>
    <div id="score-selector"></div>
    <div class="modal-btn-row" id="m-buttons"></div>
  </div>
</div>

<footer>Click a dollar value to reveal a clue · Click team name to rename</footer>

<script>
const CATEGORIES = [
  "Number of Electrons in Atoms & Isotopes",
  "Valence Electrons in Elements",
  "Dot Diagrams of Elements",
  "Electronegativity of the Element",
  "Bonds Between Chemical Compounds",
  "Electron Dot Diagrams Bonds",
  "Electron Dot Diagram Chemical Bonds",
  "Chemical Compound Names"
];

// 8 rows × 8 categories: [question, answer]
// Categories: Number of Electrons in Atoms & Isotopes | Valence Electrons in Elements | Dot Diagrams of Elements |
//             Electronegativity of the Element | Bonds Between Chemical Compounds |
//             Electron Dot Diagrams Bonds | Electron Dot Diagram Chemical Bonds | Chemical Compound Names
const CLUES = [
  // Row 1 ($200)
  [
    ["A neutral atom of hydrogen has this many electrons.", "What is 1?"],
    ["The number of valence electrons in a Group 1 element like sodium.", "What is 1?"],
    ["In a dot diagram, these are shown as dots around the element symbol.", "What are valence electrons?"],
    ["This element is the most electronegative on the periodic table.", "What is fluorine?"],
    ["This type of bond forms when two nonmetals share electrons.", "What is a covalent bond?"],
    ["In an electron dot diagram, a single line between two atoms represents this many shared electrons.", "What is 2?"],
    ["Water (H₂O) is held together by this type of bond between hydrogen and oxygen.", "What is a covalent bond?"],
    ["This is the chemical name for table salt, NaCl.", "What is sodium chloride?"]
  ],
  // Row 2 ($400)
  [
    ["Isotopes of the same element always have the same number of electrons because they have the same number of these.", "What are protons?"],
    ["Oxygen is in Group 16, so it has this many valence electrons.", "What is 6?"],
    ["Carbon has 4 valence electrons, so this many dots appear in its electron dot diagram.", "What is 4?"],
    ["Electronegativity measures an atom's ability to do this in a bond.", "What is attract electrons?"],
    ["This bond forms between a metal and a nonmetal through electron transfer.", "What is an ionic bond?"],
    ["A double bond in an electron dot diagram represents this many shared electrons.", "What is 4?"],
    ["In the electron dot diagram of HCl, the shared pair of electrons is pulled toward the chlorine because it is more this.", "What is electronegative?"],
    ["This is the chemical name for H₂O.", "What is water?"]
  ],
  // Row 3 ($600)
  [
    ["Carbon has an atomic number of 6, so a neutral carbon atom has this many electrons.", "What is 6?"],
    ["Elements in Group 17 (halogens) have this many valence electrons.", "What is 7?"],
    ["In a Lewis dot diagram for neon, this many dots surround the symbol.", "What is 8?"],
    ["On the periodic table, electronegativity generally increases in this direction across a period.", "What is left to right (toward fluorine)?"],
    ["This type of bond involves a 'sea of electrons' shared among many metal atoms.", "What is a metallic bond?"],
    ["Lone pairs in an electron dot diagram are pairs of electrons that are not doing this.", "What is bonding (not shared)?"],
    ["In the electron dot diagram of H₂, the two hydrogen atoms form this type of bond by sharing 2 electrons.", "What is a single (nonpolar covalent) bond?"],
    ["This is the chemical name for CO₂.", "What is carbon dioxide?"]
  ],
  // Row 4 ($800)
  [
    ["Carbon-14 has 6 protons and 8 neutrons; a neutral Carbon-14 atom has this many electrons.", "What is 6?"],
    ["Nitrogen (Group 15) has this many valence electrons.", "What is 5?"],
    ["Chlorine has 7 valence electrons; its dot diagram shows this many unpaired dots.", "What is 1?"],
    ["Electronegativity generally decreases as you move in this direction down a group.", "What is downward?"],
    ["When the electronegativity difference between two atoms is greater than 1.7, the bond is typically this type.", "What is ionic?"],
    ["In an electron dot diagram for O₂, the two oxygen atoms share this many electrons total in their double bond.", "What is 4?"],
    ["In the electron dot diagram of HCl, the bonding electrons are shifted toward chlorine, making this end of the molecule slightly negative.", "What is the chlorine end?"],
    ["This is the chemical name for NH₃.", "What is ammonia?"]
  ],
  // Row 5 ($1000)
  [
    ["Chlorine-35 and Chlorine-37 are isotopes. Both neutral atoms have this many electrons.", "What is 17?"],
    ["Noble gases in Group 18 are stable because they have this many valence electrons.", "What is 8 (or 2 for helium)?"],
    ["Phosphorus has 5 valence electrons; its dot diagram shows this many unpaired dots and this many lone pairs.", "What is 3 unpaired dots and 1 lone pair?"],
    ["The electronegativity difference between two identical atoms in a bond is always this.", "What is 0?"],
    ["A bond with an electronegativity difference between 0.4 and 1.7 is called this.", "What is a polar covalent bond?"],
    ["In a triple bond shown in an electron dot diagram, this many electrons are shared between the two atoms.", "What is 6?"],
    ["In the electron dot diagram of N₂, each nitrogen atom contributes 3 electrons to form this type of bond.", "What is a triple (nonpolar covalent) bond?"],
    ["This is the chemical name for NaOH.", "What is sodium hydroxide?"]
  ],
  // Row 6 ($1200)
  [
    ["To find the number of electrons in a neutral atom, you use this number from the periodic table.", "What is the atomic number?"],
    ["Sulfur is in Group 16 and has this many valence electrons, the same as oxygen.", "What is 6?"],
    ["In a dot diagram, when all 4 sides of a symbol have 2 dots each, the element is said to have a full this.", "What is a full octet?"],
    ["Fluorine has an electronegativity of 4.0 and cesium has 0.79; this large difference means the bond between them is this type.", "What is ionic?"],
    ["In an electron dot diagram of water, oxygen has 2 bonding pairs and this many lone pairs.", "What is 2?"],
    ["A coordinate covalent bond differs from a regular covalent bond because both electrons in the shared pair come from this.", "What is one atom (the donor)?"],
    ["In the electron dot diagram of CO₂, carbon forms two double bonds with oxygen atoms, making the molecule this type (polar or nonpolar).", "What is nonpolar?"],
    ["This is the chemical name for CaCO₃.", "What is calcium carbonate?"]
  ],
  // Row 7 ($1400)
  [
    ["Uranium-235 and Uranium-238 are isotopes of uranium (atomic number 92). Both neutral atoms have this many electrons.", "What is 92?"],
    ["An atom of silicon (Si, Group 14) has this many valence electrons.", "What is 4?"],
    ["In a Lewis dot diagram, this element is drawn with just 1 dot because it has only 1 valence electron and no lone pairs.", "What is hydrogen?"],
    ["If atom A has an electronegativity of 3.5 and atom B has 2.1, the difference of 1.4 makes this bond type.", "What is a polar covalent bond?"],
    ["Cl₂ has a nonpolar covalent bond because both atoms are identical and this value between them is zero.", "What is the electronegativity difference?"],
    ["In the electron dot diagram for NH₃, nitrogen forms 3 single bonds and retains this many lone pairs.", "What is 1?"],
    ["In the electron dot diagram of CH₄, carbon forms 4 single bonds, sharing this many total electrons.", "What is 8?"],
    ["This is the IUPAC name for Fe₂O₃.", "What is iron(III) oxide?"]
  ],
  // Row 8 ($1600)
  [
    ["Carbon-12 and Carbon-14 are both isotopes of carbon (atomic number 6), so both neutral atoms have this many electrons, even though their mass numbers differ.", "What is 6?"],
    ["Valence electrons are found in the outermost energy level; a neutral phosphorus atom (atomic number 15) has this many valence electrons.", "What is 5?"],
    ["In a Lewis dot diagram, an element with 3 unpaired dots needs to form this many bonds to achieve a full octet.", "What is 3?"],
    ["The electronegativity values of H (2.2) and O (3.5) give a difference of 1.3, placing the O–H bond in this category.", "What is polar covalent?"],
    ["In a Lewis structure of CO, carbon and oxygen share a triple bond; the unusually high bond order makes CO an example of a bond where carbon has a lone pair and a formal charge of this.", "What is negative 1?"],
    ["In the electron dot diagram of SO₂, sulfur holds an expanded octet by forming one single bond, one double bond, and retaining this many lone pairs.", "What is 1?"],
    ["In the electron dot diagram of HCN, carbon forms a triple bond with nitrogen and a single bond with hydrogen, giving carbon this many total bonding electrons.", "What is 8?"],
    ["This is the systematic IUPAC name for MgCl₂.", "What is magnesium chloride?"]
  ]
];

const DOLLAR_VALUES = [200, 400, 600, 800, 1000, 1200, 1400, 1600];
const NUM_TEAMS = 2;

// State
let teams = Array.from({length: NUM_TEAMS}, (_, i) => ({ name: `Team ${i+1}`, score: 0 }));
let used = Array.from({length: 8}, () => Array(8).fill(false));
let currentCell = null;
let selectedTeam = 0;

// Build scoreboard
function buildScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'team-score';
    div.innerHTML = `
      <div class="team-name" data-team="${i}">${t.name}</div>
      <div class="score-val ${t.score < 0 ? 'negative' : ''}" id="score-${i}">$${t.score.toLocaleString()}</div>
    `;
    div.querySelector('.team-name').addEventListener('dblclick', () => startRename(i, div.querySelector('.team-name')));
    sb.appendChild(div);
  });
}

function startRename(i, el) {
  const input = document.createElement('input');
  input.className = 'name-input';
  input.value = teams[i].name;
  el.replaceWith(input);
  input.focus();
  input.select();
  const finish = () => {
    teams[i].name = input.value.trim() || teams[i].name;
    buildScoreboard();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}

function updateScore(teamIdx, delta) {
  teams[teamIdx].score += delta;
  const el = document.getElementById(`score-${teamIdx}`);
  el.textContent = `$${teams[teamIdx].score.toLocaleString()}`;
  el.classList.toggle('negative', teams[teamIdx].score < 0);
}

// Build board
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  // Headers
  CATEGORIES.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'cat-header';
    h.textContent = cat;
    board.appendChild(h);
  });
  // Cells
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (used[row][col] ? ' used' : '');
      cell.innerHTML = `<span class="dollar">$${DOLLAR_VALUES[row].toLocaleString()}</span>`;
      if (!used[row][col]) {
        cell.addEventListener('click', () => openModal(row, col));
      }
      board.appendChild(cell);
    }
  }
}

// Modal
function openModal(row, col) {
  currentCell = {row, col};
  const [question, answer] = CLUES[row][col];

  document.getElementById('m-cat').textContent = CATEGORIES[col];
  document.getElementById('m-val').textContent = `$${DOLLAR_VALUES[row].toLocaleString()}`;
  document.getElementById('m-q').textContent = question;
  const ans = document.getElementById('m-a');
  ans.textContent = `✓ ${answer}`;
  ans.classList.remove('visible');

  // Team selector
  const sel = document.getElementById('score-selector');
  sel.innerHTML = '<span style="font-size:0.85rem;letter-spacing:2px;color:#7a8fc0;margin-right:6px;align-self:center;">TEAM:</span>';
  teams.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'score-team-btn' + (i === selectedTeam ? ' selected' : '');
    btn.textContent = t.name;
    btn.addEventListener('click', () => {
      selectedTeam = i;
      sel.querySelectorAll('.score-team-btn').forEach((b,j) => b.classList.toggle('selected', j===i));
    });
    sel.appendChild(btn);
  });

  // Buttons
  const btnRow = document.getElementById('m-buttons');
  btnRow.innerHTML = '';

  const revealBtn = document.createElement('button');
  revealBtn.className = 'btn btn-gold';
  revealBtn.textContent = 'Reveal Answer';
  revealBtn.addEventListener('click', () => {
    ans.classList.add('visible');
    revealBtn.style.display = 'none';
    correctBtn.style.display = '';
    wrongBtn.style.display = '';
  });

  const correctBtn = document.createElement('button');
  correctBtn.className = 'btn btn-green';
  correctBtn.textContent = '✓ Correct';
  correctBtn.style.display = 'none';
  correctBtn.addEventListener('click', () => {
    updateScore(selectedTeam, DOLLAR_VALUES[row]);
    closeModal(row, col);
  });

  const wrongBtn = document.createElement('button');
  wrongBtn.className = 'btn btn-red';
  wrongBtn.textContent = '✗ Incorrect';
  wrongBtn.style.display = 'none';
  wrongBtn.addEventListener('click', () => {
    updateScore(selectedTeam, -DOLLAR_VALUES[row]);
    closeModal(row, col);
  });

  const skipBtn = document.createElement('button');
  skipBtn.className = 'btn btn-gray';
  skipBtn.textContent = 'Skip';
  skipBtn.addEventListener('click', () => closeModal(row, col));

  btnRow.appendChild(revealBtn);
  btnRow.appendChild(correctBtn);
  btnRow.appendChild(wrongBtn);
  btnRow.appendChild(skipBtn);

  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(row, col) {
  if (row !== undefined) {
    used[row][col] = true;
    buildBoard();
  }
  document.getElementById('modal-overlay').classList.remove('active');
  currentCell = null;
}

document.getElementById('modal-close').addEventListener('click', () => {
  const c = currentCell;
  closeModal(c?.row, c?.col);
});

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) {
    const c = currentCell;
    closeModal(c?.row, c?.col);
  }
});

// Init
buildScoreboard();
buildBoard();

// Animated atom background
(function() {
  const canvas = document.getElementById('atom-bg');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Multiple atoms scattered across the background
  const atoms = [
    { x: 0.15, y: 0.25, r: 110, orbits: 3, speed: 1.0, tilt: 0 },
    { x: 0.82, y: 0.18, r: 80,  orbits: 2, speed: 1.3, tilt: 30 },
    { x: 0.88, y: 0.72, r: 120, orbits: 3, speed: 0.8, tilt: 15 },
    { x: 0.10, y: 0.78, r: 90,  orbits: 2, speed: 1.1, tilt: 45 },
    { x: 0.50, y: 0.90, r: 70,  orbits: 2, speed: 1.4, tilt: 60 },
  ];

  // Each orbit gets its own electron angle
  atoms.forEach(atom => {
    atom.angles = Array.from({ length: atom.orbits }, (_, i) => (i / atom.orbits) * Math.PI * 2);
  });

  let last = 0;
  function draw(ts) {
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dark background gradient
    const grad = ctx.createRadialGradient(
      canvas.width * 0.5, canvas.height * 0.5, 0,
      canvas.width * 0.5, canvas.height * 0.5, Math.max(canvas.width, canvas.height) * 0.8
    );
    grad.addColorStop(0, '#0d1f7a');
    grad.addColorStop(1, '#04092e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw centered logo
    if (logoImg.complete) {
      const logoSize = Math.min(canvas.width, canvas.height) * 0.28;
      const lx = (canvas.width - logoSize) / 2;
      const ly = (canvas.height - logoSize) / 2;
      ctx.globalAlpha = 0.13;
      ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
      ctx.globalAlpha = 1;
    }

    atoms.forEach(atom => {
      const cx = atom.x * canvas.width;
      const cy = atom.y * canvas.height;
      const r  = atom.r;

      // Update electron angles
      atom.angles = atom.angles.map((a, i) => a + dt * atom.speed * (0.9 + i * 0.25));

      const orbitColors = ['#00d4ff', '#7b8fff', '#00ffcc'];

      for (let o = 0; o < atom.orbits; o++) {
        const tiltRad = ((atom.tilt + o * 60) * Math.PI) / 180;
        const color = orbitColors[o % orbitColors.length];

        // Draw elliptical orbit
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(tiltRad);
        ctx.beginPath();
        ctx.ellipse(0, 0, r, r * 0.38, 0, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.18;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        ctx.restore();

        // Electron position on the ellipse
        const angle = atom.angles[o];
        const ex = cx + Math.cos(tiltRad) * r * Math.cos(angle) - Math.sin(tiltRad) * r * 0.38 * Math.sin(angle);
        const ey = cy + Math.sin(tiltRad) * r * Math.cos(angle) + Math.cos(tiltRad) * r * 0.38 * Math.sin(angle);

        // Electron glow
        const glow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 8);
        glow.addColorStop(0, color);
        glow.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(ex, ey, 8, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.globalAlpha = 0.7;
        ctx.fill();

        // Electron dot
        ctx.beginPath();
        ctx.arc(ex, ey, 3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = 1;
        ctx.fill();
      }

      // Nucleus glow
      const nucGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18);
      nucGlow.addColorStop(0, '#ffffff');
      nucGlow.addColorStop(0.3, '#f5c518');
      nucGlow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(cx, cy, 18, 0, Math.PI * 2);
      ctx.fillStyle = nucGlow;
      ctx.globalAlpha = 0.35;
      ctx.fill();

      // Nucleus core
      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#f5c518';
      ctx.globalAlpha = 0.85;
      ctx.fill();

      ctx.globalAlpha = 1;
    });

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
